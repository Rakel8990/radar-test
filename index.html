<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONCRETE | THE RADAR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --gold: #f5d55f;
            --dark-bg: #09090b;
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* --- TICKER STYLE --- */
        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background: rgba(245, 213, 95, 0.1);
            border-bottom: 1px solid rgba(245, 213, 95, 0.2);
            white-space: nowrap;
            padding: 10px 0;
        }
        .ticker-move {
            display: inline-block;
            animation: ticker 30s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* --- GOLDEN TIER "EXPENSIVE" LOOK --- */
        .golden-card {
            background: linear-gradient(145deg, #1a1a1a 0%, #0a0a0a 100%);
            border: 1px solid rgba(245, 213, 95, 0.3);
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Corner Accents */
        .golden-card::before {
            content: ""; position: absolute; top: 0; left: 0;
            width: 12px; height: 12px;
            border-top: 2px solid var(--gold); border-left: 2px solid var(--gold);
            opacity: 0.6;
        }
        .golden-card:hover {
            border-color: var(--gold);
            box-shadow: 0 0 40px rgba(245, 213, 95, 0.25);
            transform: translateY(-6px);
        }

        /* --- SEARCH & POPUP UI --- */
        .match-highlight {
            border-color: var(--gold) !important;
            box-shadow: 0 0 60px rgba(245, 213, 95, 0.5) !important;
            transform: scale(1.05);
            z-index: 50;
        }
        .card-hidden { display: none !important; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Popup - Bottom Right Correction */
        #get-listed-popup {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
        }
    </style>
</head>
<body class="pb-40">

    <div class="ticker-wrap sticky top-0 z-[110] backdrop-blur-md">
        <div class="ticker-move mono text-[10px] uppercase tracking-widest text-yellow-500">
            System Alert: Total Depositors reached 50.96K • Risk-Adjusted Yield Optimized • Concrete Vaults Active • 
        </div>
    </div>

    <header class="py-12 border-b border-white/5 bg-[#09090b]/80 backdrop-blur-xl">
        <div class="max-w-6xl mx-auto px-6">
            <div class="relative group">
                <input type="text" id="radarSearch" onkeyup="executeSearch()" 
                placeholder="SCANNING FOR TARGETS..." 
                class="w-full bg-[#0d0d0d] border border-zinc-800 rounded-xl py-5 px-14 text-xs focus:outline-none focus:border-yellow-500/50 text-white mono tracking-widest uppercase transition-all">
                <i class="fa-solid fa-crosshairs absolute left-6 top-1/2 -translate-y-1/2 text-zinc-700"></i>
            </div>
            <div id="noResults" class="hidden text-center mt-6 text-zinc-600 mono text-[10px] uppercase">
                Not found, sorry. Target not in database
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 space-y-28 mt-16">
        
        <section id="tier-gold">
            <h2 class="text-yellow-500 font-bold tracking-[0.3em] uppercase text-sm mb-10 flex items-center gap-4">
                <span class="h-[1px] w-12 bg-yellow-500/30"></span> THE GOLDEN 10
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-6" id="gold-grid"></div>
        </section>

        <section id="tier-silver">
            <h2 class="text-zinc-400 font-semibold tracking-[0.3em] uppercase text-xs mb-10 flex items-center gap-4">
                <span class="h-[1px] w-12 bg-zinc-800"></span> SILVER COLLECTIVE
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4" id="silver-grid"></div>
        </section>

        <section id="tier-trench">
            <h2 class="text-zinc-700 font-semibold tracking-[0.3em] uppercase text-xs mb-10 flex items-center gap-4">
                <span class="h-[1px] w-12 bg-zinc-900"></span> THE TRENCHES
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-5 lg:grid-cols-8 gap-3" id="trench-grid"></div>
        </section>
    </main>

    <div id="get-listed-popup" class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl shadow-2xl flex items-center gap-4 animate-bounce">
        <div class="text-[10px] mono text-zinc-400">WANT TO APPEAR ON THE RADAR?</div>
        <button class="bg-yellow-500 text-black text-[10px] font-bold px-4 py-2 rounded-lg uppercase">Get Listed</button>
    </div>

    <script>
        const userList = [
            "rakel8990", "alpha_prime", "concrete_vault", "yield_arch", "risk_zero",
            "market_maker", "liquid_flow", "zenith_node", "macro_vision", "block_pioneer",
            "sat_stacker", "prime_asset", "vortex_trader", "atlas_cap", "mint_oracle",
            "chain_ghost", "proxy_user", "delta_neutral", "sigma_dev", "omega_vault"
        ];

        function initRadar() {
            const grids = {
                gold: { el: document.getElementById('gold-grid'), count: 10, class: 'golden-card p-10' },
                silver: { el: document.getElementById('silver-grid'), count: 20, class: 'bg-zinc-900/40 border border-zinc-800 p-6' },
                trench: { el: document.getElementById('trench-grid'), count: 40, class: 'bg-zinc-950 border border-zinc-900/50 p-4 text-[10px]' }
            };

            for (const key in grids) {
                for (let i = 0; i < grids[key].count; i++) {
                    const handle = userList[i % 20];
                    grids[key].el.innerHTML += `
                        <a href="https://x.com/${handle}" target="_blank" 
                           class="radar-item group rounded-2xl text-center flex items-center justify-center min-h-[100px] transition-all duration-300 ${grids[key].class}">
                            <span class="text-white group-hover:text-yellow-400 font-medium">@${handle}</span>
                        </a>`;
                }
            }
        }

        function executeSearch() {
            const query = document.getElementById('radarSearch').value.toLowerCase().trim();
            const items = document.querySelectorAll('.radar-item');
            const error = document.getElementById('noResults');
            let found = 0;
            let match = null;

            items.forEach(item => {
                const handle = item.textContent.toLowerCase().replace('@', '').trim();
                item.classList.remove('match-highlight');

                if (handle.includes(query)) {
                    item.classList.remove('card-hidden');
                    found++;
                    if (handle === query) match = item;
                } else {
                    item.classList.add('card-hidden');
                }
            });

            error.style.display = (found === 0 && query !== "") ? "block" : "none";

            // 100% Match Scroll
            if (match && query.length > 2) {
                match.classList.add('match-highlight');
                match.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        initRadar();
    </script>
</body>
</html>
