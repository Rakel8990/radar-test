<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Directory | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --gold-primary: #f5d55f;
            --gold-glow: rgba(245, 213, 95, 0.3);
            --bg-dark: #09090b;
        }

        body {
            background-color: var(--bg-dark);
            color: #fafafa;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        /* --- GOLDEN TIER "EXPENSIVE" EFFECTS --- */
        .golden-card {
            position: relative;
            background: linear-gradient(145deg, #121214, #09090b);
            border: 1px solid rgba(245, 213, 95, 0.4);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            overflow: hidden;
        }

        /* Ambient Gold Shimmer */
        .golden-card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(125deg, transparent 0%, rgba(245, 213, 95, 0.05) 45%, rgba(245, 213, 95, 0.1) 50%, rgba(245, 213, 95, 0.05) 55%, transparent 100%);
            background-size: 200% 200%;
            animation: shimmer 6s infinite linear;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .golden-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: var(--gold-primary);
            box-shadow: 0 10px 30px -10px var(--gold-glow);
            z-index: 10;
        }

        /* --- SEARCH HIGHLIGHT --- */
        .match-highlight {
            outline: 2px solid var(--gold-primary) !important;
            box-shadow: 0 0 50px var(--gold-glow) !important;
            transform: scale(1.05) translateY(-5px);
            z-index: 20;
        }

        /* --- UTILITY --- */
        .card-hidden { display: none !important; }
        
        .glass-panel {
            background: rgba(18, 18, 20, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .mono-label {
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-[100] glass-panel py-6 mb-12">
        <div class="max-w-6xl mx-auto px-6">
            <div class="relative group">
                <input type="text" id="tierSearch" onkeyup="executeSearch()" placeholder="SCANNING DATABASE FOR USERS..." 
                class="w-full bg-zinc-900 border border-zinc-800 rounded-xl py-4 px-14 text-sm focus:outline-none focus:border-yellow-500/50 text-white font-mono transition-all">
                <i class="fa-solid fa-crosshairs absolute left-5 top-1/2 -translate-y-1/2 text-zinc-600 group-focus-within:text-yellow-500 transition-colors"></i>
            </div>
            <div id="noResultsMsg" class="hidden text-center mt-4 text-zinc-600 mono-label text-[10px]">
                !! DATA CORRUPTION: NO MATCHING HANDLES FOUND !!
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 space-y-20">
        
        <section id="tier-gold-section">
            <h2 class="mono-label text-yellow-500 text-xs mb-8 flex items-center gap-4">
                <span class="h-px w-12 bg-yellow-500/40"></span> The Golden 10
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4" id="gold-grid"></div>
        </section>

        <section id="tier-silver-section">
            <h2 class="mono-label text-zinc-400 text-xs mb-8 flex items-center gap-4">
                <span class="h-px w-12 bg-zinc-500/20"></span> Silver Collective
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4" id="silver-grid"></div>
        </section>

        <section id="tier-trench-section">
            <h2 class="mono-label text-zinc-600 text-xs mb-8 flex items-center gap-4">
                <span class="h-px w-12 bg-zinc-700/20"></span> The Trenches
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-5 lg:grid-cols-8 gap-3" id="trench-grid"></div>
        </section>

    </main>

    <script>
        // YOUR 20 USERS (Repeated to fill the tiers)
        const userList = [
            "rakel8990", "alpha_prime", "concrete_vault", "yield_arch", "risk_zero",
            "market_maker", "liquid_flow", "zenith_node", "macro_vision", "block_pioneer",
            "sat_stacker", "prime_asset", "vortex_trader", "atlas_cap", "mint_oracle",
            "chain_ghost", "proxy_user", "delta_neutral", "sigma_dev", "omega_vault"
        ];

        function initTiers() {
            const gold = document.getElementById('gold-grid');
            const silver = document.getElementById('silver-grid');
            const trench = document.getElementById('trench-grid');

            // 1. Generate Golden 10
            for(let i=0; i<10; i++) {
                gold.innerHTML += createCard(userList[i % 20], 'golden-card p-6');
            }

            // 2. Generate Silver 20
            for(let i=0; i<20; i++) {
                silver.innerHTML += createCard(userList[i % 20], 'bg-zinc-900/50 border border-zinc-800 p-5 hover:border-zinc-500');
            }

            // 3. Generate Trench 40
            for(let i=0; i<40; i++) {
                trench.innerHTML += createCard(userList[i % 20], 'bg-zinc-950 border border-zinc-900 p-4 text-[11px] hover:bg-zinc-900');
            }
        }

        function createCard(handle, styleClasses) {
            return `
                <a href="https://x.com/${handle}" target="_blank" 
                   class="user-card group rounded-xl text-center flex items-center justify-center min-h-[90px] transition-all duration-300 ${styleClasses}">
                    <span class="text-zinc-400 group-hover:text-white transition-colors duration-300 font-medium">@${handle}</span>
                </a>`;
        }

        function executeSearch() {
            const query = document.getElementById('tierSearch').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.user-card');
            const noResults = document.getElementById('noResultsMsg');
            let foundCount = 0;
            let exactMatch = null;

            cards.forEach(card => {
                const handle = card.textContent.toLowerCase().replace('@', '');
                
                // Reset visual match state
                card.classList.remove('match-highlight');

                if (handle.includes(query)) {
                    card.classList.remove('card-hidden');
                    foundCount++;
                    // Check for 100% exact match
                    if (handle === query) {
                        exactMatch = card;
                    }
                } else {
                    card.classList.add('card-hidden');
                }
            });

            // Display "No Results" only if searching and nothing found
            noResults.style.display = (foundCount === 0 && query !== "") ? "block" : "none";

            // If exact match found and query is long enough, scroll to it
            if (exactMatch && query.length > 2) {
                exactMatch.classList.add('match-highlight');
                exactMatch.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // Run on load
        initTiers();
    </script>
</body>
</html>
